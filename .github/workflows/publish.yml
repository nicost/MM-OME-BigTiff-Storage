name: Publish to Maven Central

# Manual trigger only, for now. Run it from the Actions tab
# ("Publish to Maven Central" -> "Run workflow").
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and sign only, do not upload to Central"
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      # setup-java writes ~/.m2/settings.xml with a "central" server whose
      # credentials come from the env vars named below.
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "8"
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          cache: maven

      # Import the GPG key explicitly — more reliable than setup-java's built-in
      # import, which can silently fail if the key format has any issues.
      # Store GPG_PRIVATE_KEY as the raw ASCII-armored output of:
      #   gpg --export-secret-keys --armor <KEY_ID>
      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      - name: Deploy
        if: ${{ !inputs.dry_run }}
        run: mvn -B -Prelease clean deploy
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

      - name: Dry run (build + sign, no upload)
        if: ${{ inputs.dry_run }}
        run: mvn -B -Prelease clean verify
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
